spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

  data:
    mongodb:
      uri: mongodb://localhost:27017/test_finanscepte_user

security:
  jwt:
    secret: test-secret-key-test-secret-key-123
    expiration-seconds: 3600
